bundle:
  name: dab_tutorial_1
  uuid: 17381302-863a-4497-b97d-06cb2892fb5e

include:
  - resources/*.yml
  # adding the second line to read folders within the resources folder
  - resources/*/*.yml 


variables:
  catalog:
    description: the catalog to use
    default: israel_catalog
  schema:
    description: the schema to use
    default: default

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: dbc-a1941230-1dbe.cloud.databricks.com
    variables:
      catalog: israel_catalog
      schema: ${workspace.current_user.short_name}
    permissions:
      - group_name: admins
        level: CAN_MANAGE
    presets:
      name_prefix: ${workspace.current_user.short_name}
      source_linked_deployment: false

  prod:
    mode: production
    workspace:
      host: dbc-a1941230-1dbe.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/israelawstest20220727@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/PROD1/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: israel_catalog
      schema: prod
    permissions:
      - user_name: israelawstest20220727@gmail.com
        level: CAN_MANAGE
      - group_name: admins
        level: CAN_RUN
